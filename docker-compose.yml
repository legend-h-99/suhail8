services:
  postgres:
    image: postgres:16-alpine
    container_name: cci-postgres
    environment:
      POSTGRES_USER: erp
      POSTGRES_PASSWORD: erp_password
      POSTGRES_DB: tcc_erp
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp -d tcc_erp"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cci-api
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://erp:erp_password@postgres:5432/tcc_erp?schema=public
      DEFAULT_TENANT_SLUG: cci-riyadh
      JWT_ACCESS_SECRET: dev_access_secret_change_me
      JWT_ACCESS_TTL: 900
      JWT_REFRESH_SECRET: dev_refresh_secret_change_me
      JWT_REFRESH_TTL: 2592000
      CORS_ORIGINS: http://localhost:3000
      SWAGGER_ENABLED: "true"
      SWAGGER_PATH: docs
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cci-web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - api
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  pgdata:
